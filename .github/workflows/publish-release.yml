name: Publish Packages
on:
  workflow_dispatch:
  release:
    types: [created]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v2
      - name: Set up JDK 21
        uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Change wrapper permissions
        run: chmod +x ./gradlew
      - name: Debug eco resolution
        uses: gradle/gradle-build-action@v2
        with:
          arguments: :core:common:dependencyInsight --dependency com.willfp:eco --configuration compileClasspath --info
      - name: List all repositories being used
        run: ./gradlew :core:common:dependencies --configuration compileClasspath
      - name: Publish package
        uses: gradle/gradle-build-action@v2
        with:
          arguments: publish --refresh-dependencies --info
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
